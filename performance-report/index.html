<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRS EA Terminal - Premium Performance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bright: #ffd700;
            --gold-main: #d4af37;
            --bg-navy: #020817;
            --card-navy: #0f172a;
            --neon-red: #ff3b69;
            --neon-green: #00ffa3;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-navy); 
            color: white; 
            overflow-x: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 1. ANIMASI LATAR BELAKANG GRID BERGERAK */
        .trading-bg-base {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #0d1b3e 0%, #020817 100%);
            overflow: hidden;
        }
        .trading-grid-overlay {
            position: fixed;
            top: -50px; left: 0; width: 100%; height: calc(100% + 100px);
            z-index: 1;
            background: 
                linear-gradient(rgba(212, 175, 55, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            animation: pan-grid 20s linear infinite;
            pointer-events: none;
        }
        @keyframes pan-grid {
            0% { transform: translateY(0); }
            100% { transform: translateY(45px); } /* Bergerak ke bawah sejauh satu sel grid */
        }

        /* 2. ANIMASI STAGGERED FADE-UP (KEMASUKAN MELATA) */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-stagger-1 { animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
        .anim-stagger-2 { animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
        .anim-stagger-3 { animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
        .anim-stagger-4 { animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; }
        .anim-stagger-5 { animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both; }

        /* 3. ANIMASI TEKS BERKILAU (SHIMMER) */
        .shimmer-text {
            background: linear-gradient(90deg, #ffffff 0%, #ffd700 50%, #ffffff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Hover Lift Animation untuk kad */
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Style Asal yang lain */
        select { background-color: #1a2235 !important; color: white !important; border: 1px solid rgba(212, 175, 55, 0.4) !important; appearance: none; padding-right: 2rem !important; }
        select option { background-color: #020817 !important; color: white !important; padding: 12px; font-weight: 700; }
        .scanline { width: 100%; height: 150px; z-index: 5; background: linear-gradient(0deg, rgba(212, 175, 55, 0) 0%, rgba(212, 175, 55, 0.03) 50%, rgba(212, 175, 55, 0) 100%); position: fixed; top: -150px; animation: scan 15s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: -150px; } 100% { top: 100vh; } }
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(2, 8, 23, 0.98); border-bottom: 1px solid rgba(212, 175, 55, 0.3); white-space: nowrap; backdrop-filter: blur(20px); position: relative; z-index: 20; }
        .ticker-content { display: inline-block; animation: ticker 45s linear infinite; padding: 10px 0; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8); }
        .copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold-bright); color: #000; padding: 10px 24px; border-radius: 50px; font-weight: 900; font-size: 13px; z-index: 1000; box-shadow: 0 0 35px rgba(212, 175, 55, 0.6); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .calendar-cell { min-height: 56px; padding: 4px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; border-radius: 10px; background: rgba(255, 255, 255, 0.03); border: 1px solid transparent; transition: all 0.2s ease; }
        @media (min-width: 640px) { .calendar-cell { min-height: 70px; padding: 6px; border-radius: 12px; } }
        .glow-pulse { animation: pulse-glow 3s infinite ease-in-out; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); } 50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); } }
        .path-draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 3s ease-out forwards infinite; }
        @keyframes draw { 0% { stroke-dashoffset: 200; opacity: 0; } 50% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0; } }
        .float-icon { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.05); } }
        .btn-deploy { background: var(--gold-bright) !important; color: #000 !important; font-weight: 900 !important; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); transition: transform 0.1s; }
        .btn-deploy:active { transform: scale(0.95); }
        .config-scroll::-webkit-scrollbar { width: 5px; }
        .config-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .config-scroll::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZMT9Ri0OsIS7Qxkpvonx7CQHAFUQjfp26m8yI9IcOxFUzmbdLkCDQJXjDPmceQrgu/exec";
        const CACHE_KEY = "vrs_terminal_cache_v11_animated";
        const LOGO_URL = "https://i.postimg.cc/T3hfZtjP/buatkan-design-logo-202604090208-removebg-preview.png";

        // Global Helper Functions
        const getDaysInMonth = (m, y) => new Date(y, new Date(`${m} 1, ${y}`).getMonth() + 1, 0).getDate();
        const getStartDayOfMonth = (m, y) => new Date(`${m} 1, ${y}`).getDay();

        const MarketTicker = () => {
            const pairs = ["XAUUSD +1.24%", "EURUSD +0.24%", "BTCUSD +4.45%", "NAS100 -0.12%", "GBPUSD +0.05%", "VRS EA ACTIVE", "STABLE_NODE", "SECURE_SYNC"];
            return (
                <div className="ticker-wrap no-select sticky top-0">
                    <div className="ticker-content">
                        {[...pairs, ...pairs].map((text, i) => (
                            <span key={i} className="mx-5 sm:mx-6 text-[10px] sm:text-xs font-bold tracking-widest uppercase text-zinc-300 mono">
                                {text.includes('+') ? <span className="text-[#00ffa3]">▲ {text}</span> : text.includes('-') ? <span className="text-[#ff3b69]">▼ {text}</span> : text}
                            </span>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const [editingItem, setEditingItem] = useState(null);
            const [editForm, setEditForm] = useState({ pl: '', percent: '' });
            const [toast, setToast] = useState('');
            const [equity, setEquity] = useState(1000);
            const [withdrawal, setWithdrawal] = useState(0);
            const [month, setMonth] = useState('February');
            const [year, setYear] = useState(2025);
            const [currency, setCurrency] = useState('USD');
            const [broker, setBroker] = useState('VRS Broker');
            const [invId, setInvId] = useState('');
            const [invServer, setInvServer] = useState('');
            const [invPass, setInvPass] = useState('');
            const [monthlyPL, setMonthlyPL] = useState({
                janPL: 0, febPL: 0, marPL: 0, aprPL: 0, mayPL: 0, junPL: 0,
                julPL: 0, augPL: 0, sepPL: 0, octPL: 0, novPL: 0, decPL: 0
            });
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [settingsForm, setSettingsForm] = useState({});
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');
            const [clickCount, setClickCount] = useState(0);
            const [showAdminTrigger, setShowAdminTrigger] = useState(false);
            
            const isUpdatingRef = useRef(false);

            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            const calendarMonthPL = useMemo(() => {
                return data.reduce((sum, item) => sum + (Number(item.pl) || 0), 0);
            }, [data]);

            const manualHistoryPL = useMemo(() => {
                return Object.values(monthlyPL).reduce((a, b) => Number(a) + Number(b), 0);
            }, [monthlyPL]);

            const currentBalance = useMemo(() => {
                return Number(equity) + manualHistoryPL + calendarMonthPL - Number(withdrawal);
            }, [equity, manualHistoryPL, calendarMonthPL, withdrawal]);

            const totalROI = useMemo(() => {
                const initial = Number(equity);
                if (initial <= 0) return 0;
                return ((manualHistoryPL + calendarMonthPL) / initial) * 100;
            }, [manualHistoryPL, calendarMonthPL, equity]);

            const analytics = useMemo(() => {
                const trades = data.filter(i => i.pl !== null && i.pl !== "");
                const wins = trades.filter(i => Number(i.pl) > 0);
                const winRate = trades.length > 0 ? (wins.length / trades.length) * 100 : 0;
                return { winRate };
            }, [data]);

            const calendarGrid = useMemo(() => {
                const grid = [];
                const start = getStartDayOfMonth(month, year);
                const daysInMonth = getDaysInMonth(month, year);
                for (let i = 0; i < start; i++) grid.push({ isBlank: true });
                for (let i = 1; i <= daysInMonth; i++) {
                    const found = data.find(d => Number(d.date) === i);
                    grid.push(found || { date: i, pl: null, percent: null });
                }
                return grid;
            }, [data, month, year]);

            useEffect(() => {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (parsed.data) setData(parsed.data);
                        if (parsed.settings) applySettings(parsed.settings);
                    } catch (e) {}
                }
                fetchData(); 
            }, []);

            const applySettings = (s) => {
                setEquity(Number(s.equity) || 0);
                setWithdrawal(Number(s.withdrawal) || 0);
                setMonth(s.month || 'February');
                setYear(Number(s.year) || 2025);
                setCurrency(s.currency || 'USD');
                setBroker(s.broker || 'VRS Broker');
                setInvId(s.invId || '');
                setInvServer(s.invServer || '');
                setInvPass(s.invPass || '');
                setMonthlyPL({
                    janPL: Number(s.janPL) || 0, febPL: Number(s.febPL) || 0, marPL: Number(s.marPL) || 0,
                    aprPL: Number(s.aprPL) || 0, mayPL: Number(s.mayPL) || 0, junPL: Number(s.junPL) || 0,
                    julPL: Number(s.julPL) || 0, augPL: Number(s.augPL) || 0, sepPL: Number(s.sepPL) || 0,
                    octPL: Number(s.octPL) || 0, novPL: Number(s.novPL) || 0, decPL: Number(s.decPL) || 0
                });
            };

            const fetchData = () => {
                if (isUpdatingRef.current) return;
                setIsLoading(true);
                setSyncStatus('SYNCING');
                fetch(SCRIPT_URL + "?timestamp=" + new Date().getTime())
                    .then(res => res.json())
                    .then(result => {
                        if (isUpdatingRef.current) return;
                        if (result.data) {
                            const updatedData = result.data.filter(i => i.date).map(item => ({
                                ...item,
                                date: Number(item.date),
                                pl: item.pl === "" || item.pl === null ? null : Number(item.pl),
                                percent: item.percent === "" || item.percent === null ? null : Number(item.percent)
                            })).sort((a, b) => a.date - b.date);
                            setData(updatedData);
                            localStorage.setItem(CACHE_KEY, JSON.stringify({ data: updatedData, settings: result.settings }));
                        }
                        if (result.settings) applySettings(result.settings);
                        setIsLoading(false);
                        setSyncStatus('LIVE');
                        setTimeout(() => setSyncStatus(''), 3000);
                    })
                    .catch(() => {
                        setSyncStatus('OFFLINE');
                        setIsLoading(false);
                    });
            };

            const sendToGas = async (payload) => {
                isUpdatingRef.current = true;
                setSyncStatus('UPDATING');
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    setSyncStatus('SUCCESS');
                    setTimeout(() => { setSyncStatus(''); isUpdatingRef.current = false; }, 4000); 
                    return true;
                } catch {
                    setSyncStatus('FAILED');
                    isUpdatingRef.current = false;
                    return false;
                }
            };

            const handleSaveSettings = async () => {
                const s = settingsForm;
                applySettings(s);
                setShowSettingsModal(false);
                await sendToGas({ action: 'updateSettings', ...s });
            };

            const handleLogoClick = () => {
                const newCount = clickCount + 1;
                setClickCount(newCount);
                if (newCount === 3) {
                    setShowAdminTrigger(true);
                    setClickCount(0);
                } else {
                    setTimeout(() => setClickCount(0), 1000);
                }
            };

            const copyToClipboard = (text, label) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setToast(`${label} Copied!`);
                setTimeout(() => setToast(''), 2500);
            };

            const formatValue = (v) => {
                if (v === null || v === '' || isNaN(v)) return null;
                const num = Number(v);
                return (num >= 0 ? '+' : '') + num.toFixed(2);
            };

            return (
                <div className="min-h-screen flex flex-col items-center relative overflow-hidden text-white selection:bg-[#ffd700]/30">
                    <div className="trading-bg-base"></div>
                    <div className="trading-grid-overlay"></div>
                    <div className="scanline"></div>
                    <MarketTicker />
                    
                    {toast && <div className="copy-toast no-select">{toast}</div>}

                    <div className="w-full max-w-[480px] p-2.5 sm:p-5 pb-20 relative z-10">
                        <div className="glass-panel w-full rounded-[28px] sm:rounded-[40px] overflow-hidden relative">
                            
                            {/* Header Section (Stagger 1) */}
                            <div className="bg-[#0d1b3e]/95 p-5 sm:p-7 border-b border-white/10 relative anim-stagger-1">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#ffd700]/60 to-transparent"></div>
                                <div className="flex justify-between items-center mb-4 sm:mb-6">
                                    <div className="flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 rounded-full bg-[#ffd700] animate-pulse shadow-[0_0_10px_#ffd700]"></div>
                                        <span className="text-[9px] sm:text-[10px] uppercase tracking-[0.2em] text-[#ffd700] font-black mono">Premium Terminal</span>
                                    </div>
                                    <div className="flex gap-2">
                                        {(showAdminTrigger || isAdmin) && (
                                            <React.Fragment>
                                                {isAdmin && (
                                                    <button onClick={() => { setSettingsForm({ month, year, currency, equity, broker, invId, invServer, invPass, withdrawal, ...monthlyPL }); setShowSettingsModal(true); }} 
                                                        className="p-2 sm:p-2.5 rounded-xl bg-white/10 text-[#ffd700] active:scale-90 hover:bg-white/20 transition-all text-sm sm:text-base border border-white/5">⚙️</button>
                                                )}
                                                <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLoginModal(true)} className={`p-2 sm:p-2.5 rounded-xl transition-all active:scale-90 text-sm sm:text-base border border-white/5 ${isAdmin ? 'bg-[#ff3b69]/30 text-[#ff3b69]' : 'bg-white/10 text-[#ffd700] hover:bg-white/20'}`}>
                                                    {isAdmin ? '🔓' : '🔒'}
                                                </button>
                                            </React.Fragment>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="flex flex-col items-center text-center mt-1">
                                    <div className="relative mb-4 sm:mb-5">
                                        <div className="absolute inset-0 bg-[#ffd700]/15 blur-xl rounded-full"></div>
                                        <img src={LOGO_URL} alt="Logo" onClick={handleLogoClick} className="h-16 sm:h-20 w-auto object-contain relative active:scale-95 transition-transform cursor-pointer no-select drop-shadow-xl" />
                                    </div>
                                    <h1 className="text-xl sm:text-2xl font-black bg-gradient-to-b from-white to-[#ffd700] bg-clip-text text-transparent uppercase tracking-tight leading-tight mb-2">Performance Report</h1>
                                    <div className="px-4 sm:px-5 py-1 sm:py-1.5 bg-[#ffd700]/10 rounded-full border border-[#ffd700]/30 inline-flex items-center shadow-[0_0_10px_rgba(212,175,55,0.15)] hover-lift cursor-default">
                                        <span className="text-[9px] sm:text-[10px] font-black text-[#ffd700] uppercase tracking-[0.15em]">{broker}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 sm:p-7 space-y-5 sm:space-y-6">
                                {/* MAIN EQUITY CARD (Stagger 2) */}
                                <div className="anim-stagger-2 hover-lift bg-gradient-to-br from-[#1e293b] to-[#020617] rounded-[24px] sm:rounded-[30px] p-5 sm:p-7 border border-[#ffd700]/30 glow-pulse relative overflow-hidden shadow-xl flex justify-between items-center cursor-default">
                                    <div className="absolute top-[-20%] right-[-10%] w-32 h-32 bg-[#ffd700]/10 blur-[60px] rounded-full"></div>
                                    
                                    <div className="relative z-10 flex-1">
                                        <div className="text-[9px] sm:text-[10px] uppercase text-zinc-300 font-black tracking-[0.2em] mb-1 sm:mb-2 mono">Global Equity Balance</div>
                                        <div className="text-2xl sm:text-4xl font-black tracking-tighter shimmer-text mono mb-4 sm:mb-5 drop-shadow-md">
                                            {currentBalance.toLocaleString()} <span className="text-sm font-bold text-white">{currency}</span>
                                        </div>
                                        <div className="flex gap-5 sm:gap-8">
                                            <div className="flex flex-col">
                                                <span className="text-[8px] sm:text-[9px] uppercase text-zinc-400 font-black tracking-widest mb-0.5 sm:mb-1">Win Rate</span>
                                                <span className="text-sm sm:text-base font-black text-[#00ffa3] drop-shadow-sm">{analytics.winRate.toFixed(1)}%</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[8px] sm:text-[9px] uppercase text-zinc-400 font-black tracking-widest mb-0.5 sm:mb-1">Growth ROI</span>
                                                <span className={`text-sm sm:text-base font-black mono drop-shadow-sm ${totalROI >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b69]'}`}>{totalROI.toFixed(2)}%</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* DYNAMIC PROFIT/LOSS ANIMATION */}
                                    <div className="relative z-20 w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center flex-shrink-0">
                                        <div className="float-icon relative w-full h-full">
                                            {totalROI >= 0 ? (
                                                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#00ffa3" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" className="path-draw"/><polyline points="17 6 23 6 23 12" className="path-draw"/></svg>
                                            ) : (
                                                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#ff3b69" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6" className="path-draw"/><polyline points="17 18 23 18 23 12" className="path-draw"/></svg>
                                            )}
                                            <div className={`absolute inset-0 blur-2xl opacity-40 rounded-full ${totalROI >= 0 ? 'bg-[#00ffa3]' : 'bg-[#ff3b69]'}`}></div>
                                        </div>
                                    </div>
                                </div>

                                {/* INVESTOR LOGIN CARD (Stagger 3) */}
                                <div className="anim-stagger-3 hover-lift bg-black/50 rounded-[20px] sm:rounded-[24px] p-4 sm:p-5 border border-white/10 relative group shadow-lg">
                                    <div className="text-[10px] uppercase text-[#ffd700] font-black tracking-[0.15em] mb-3 sm:mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 bg-[#ffd700] rounded-full shadow-[0_0_8px_#ffd700]"></div>
                                        METATRADER 4 Login (Read-Only)
                                    </div>
                                    <div className="space-y-2">
                                        {[ {l:"Login ID", v:invId}, {l:"Server", v:invServer}, {l:"Password", v:invPass} ].map((item, idx) => (
                                            <div key={idx} onClick={() => copyToClipboard(item.v, item.l)} className="copy-card flex justify-between items-center p-2.5 sm:p-3.5 rounded-[10px] sm:rounded-xl border border-white/[0.05] bg-white/[0.03] cursor-pointer transition-all active:scale-[0.98]">
                                                <span className="text-[10px] sm:text-xs text-zinc-300 font-bold uppercase tracking-wide">{item.l}</span>
                                                <div className="flex items-center gap-2 sm:gap-3 overflow-hidden text-white">
                                                    <span className="text-[11px] sm:text-sm font-black mono truncate tracking-wider drop-shadow-sm">{item.v || 'N/A'}</span>
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-zinc-500 group-hover:text-[#ffd700] flex-shrink-0"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* MONTHLY P/L CARD (Stagger 4) */}
                                <div className="anim-stagger-4 hover-lift grid grid-cols-1 gap-4 cursor-default">
                                    <div className="bg-[#0f172a] p-5 sm:p-6 rounded-[20px] sm:rounded-[24px] border border-[#ffd700]/20 text-center shadow-md">
                                        <div className="text-[10px] sm:text-xs uppercase text-zinc-300 font-black mb-1 sm:mb-2 tracking-widest">{month.substring(0,3)} P/L</div>
                                        <div className={`text-2xl sm:text-3xl font-black mono drop-shadow-md ${calendarMonthPL >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b69]'}`}>{formatValue(calendarMonthPL)}</div>
                                    </div>
                                </div>

                                {/* CALENDAR SECTION (Stagger 5) */}
                                <div className="anim-stagger-5 pt-2 sm:pt-4">
                                    <div className="flex justify-between items-center mb-4 sm:mb-5 px-1 sm:px-2">
                                        <div className="text-[11px] sm:text-sm font-black tracking-widest uppercase text-white flex items-center gap-2 sm:gap-3"><span className="w-3 sm:w-4 h-[2px] sm:h-[3px] bg-[#ffd700] rounded-full"></span>{month} {year}</div>
                                        {syncStatus && <div className="text-[8px] sm:text-[10px] font-black text-[#ffd700] animate-pulse uppercase tracking-widest bg-[#ffd700]/10 px-2.5 py-1 sm:py-1.5 rounded-lg border border-[#ffd700]/20">{syncStatus}</div>}
                                    </div>

                                    <div className="no-select bg-[#0a0f1c] p-2 sm:p-3 rounded-2xl border border-white/5">
                                        <div className="grid grid-cols-7 mb-3 sm:mb-4 text-center text-[9px] sm:text-[10px] font-black text-zinc-400 uppercase mono tracking-widest">{daysOfWeek.map(d => <div key={d}>{d}</div>)}</div>
                                        
                                        <div className="grid grid-cols-7 gap-1 sm:gap-2">
                                            {calendarGrid.map((item, i) => (
                                                <div key={i} onClick={() => !item.isBlank && isAdmin && (setEditingItem(item), setEditForm({ pl: item.pl !== null ? item.pl : '', percent: item.percent !== null ? item.percent : '' }))}
                                                    className={`calendar-cell ${!item.isBlank && isAdmin ? 'cursor-pointer hover:border-[#ffd700]/50 hover:bg-white/5 active:scale-90' : ''}`}>
                                                    {!item.isBlank && (
                                                        <React.Fragment>
                                                            <span className={`text-[11px] sm:text-[13px] font-bold mb-1 sm:mb-1.5 ${item.pl !== null ? 'text-white' : 'text-zinc-500'}`}>{item.date}</span>
                                                            {item.pl !== null && (
                                                                <div className="flex flex-col items-center w-full text-center">
                                                                    <div className={`w-full h-[1px] sm:h-[2px] mb-1 sm:mb-1.5 rounded-full ${Number(item.pl) >= 0 ? 'bg-[#00ffa3]/50' : 'bg-[#ff3b69]/50'}`}></div>
                                                                    <span className={`text-[7px] font-black uppercase tracking-widest mb-0.5 drop-shadow-sm ${Number(item.pl) >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b69]'}`}>{Number(item.pl) >= 0 ? 'PROFIT' : 'LOSS'}</span>
                                                                    <span className={`text-[9px] sm:text-[10px] font-bold tracking-tighter drop-shadow-sm ${Number(item.pl) >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b69]'} mono`}>{formatValue(item.pl)}</span>
                                                                </div>
                                                            )}
                                                        </React.Fragment>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 sm:p-5 bg-white/[0.02] text-center border-t border-white/10 mt-2">
                                <p className="text-[8px] sm:text-[9px] text-zinc-600 font-black uppercase tracking-[0.6em] sm:tracking-[0.8em] mono">VRS-TERMINAL-PREMIUM</p>
                            </div>
                        </div>
                    </div>

                    {/* Authentication Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-5 z-[100] backdrop-blur-xl text-white">
                            <div className="bg-[#0f172a] p-8 sm:p-10 rounded-[32px] sm:rounded-[40px] border border-[#ffd700]/30 w-full max-w-[320px] text-center shadow-[0_0_50px_rgba(0,0,0,0.8)] relative">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-[#ffd700] to-transparent"></div>
                                <div className="w-16 h-16 rounded-3xl bg-gold/5 flex items-center justify-center mx-auto mb-6 text-2xl border border-gold/10 text-gold shadow-inner">🔒</div>
                                <h3 className="text-xl font-black mb-6 uppercase tracking-tighter mono">Authenticate</h3>
                                <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (passwordInput === "admin123" ? (setIsAdmin(true), setShowLoginModal(false)) : setLoginError("INVALID_KEY"))}
                                    className="w-full bg-black text-white p-4 rounded-2xl border border-white/10 outline-none mb-3 text-center tracking-[0.6em] text-lg focus:border-[#ffd700] transition-all mono" placeholder="••••••" autoFocus />
                                {loginError && <p className="text-[#ff3b69] text-[10px] font-bold uppercase mb-4 tracking-widest">{loginError}</p>}
                                <button onClick={() => passwordInput === "admin123" ? (setIsAdmin(true), setShowLoginModal(false)) : setLoginError("INVALID_KEY")} className="w-full py-4 rounded-2xl bg-[#ffd700] text-black font-black uppercase tracking-widest text-sm shadow-[0_0_20px_rgba(212,175,55,0.3)] active:scale-95 transition-all">Authorize</button>
                                <button onClick={() => setShowLoginModal(false)} className="mt-5 text-zinc-400 text-[10px] font-black uppercase tracking-widest hover:text-white transition-colors">Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* Edit Day Entry Modal */}
                    {editingItem && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-5 z-[100] backdrop-blur-xl text-white">
                            <div className="bg-[#0f172a] p-8 sm:p-10 rounded-[32px] sm:rounded-[40px] border border-[#ffd700]/30 w-full max-w-[340px] shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                                <h3 className="text-lg font-black mb-8 uppercase tracking-tighter mono text-center border-b border-white/10 pb-4">Update Day {editingItem.date}</h3>
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1.5 block">P/L Amount ({currency})</label>
                                        <input type="number" value={editForm.pl} onChange={e => setEditForm({...editForm, pl: e.target.value, percent: e.target.value ? ((Number(e.target.value) / (Number(equity) || 1)) * 100).toFixed(2) : ''})}
                                            className="w-full bg-black text-white p-4 rounded-2xl border border-white/10 outline-none text-lg font-black focus:border-[#ffd700] transition-all mono" placeholder="0.00" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1.5 block">ROI (%)</label>
                                        <input type="number" value={editForm.percent} onChange={e => setEditForm({...editForm, percent: e.target.value})}
                                            className="w-full bg-black text-white p-4 rounded-2xl border border-white/10 outline-none text-lg font-black focus:border-[#ffd700] transition-all mono" placeholder="0.00" />
                                    </div>
                                </div>
                                <div className="flex gap-4 mt-8">
                                    <button onClick={() => setEditingItem(null)} className="flex-1 text-zinc-400 font-black uppercase text-[10px] hover:text-white transition-colors tracking-widest">Discard</button>
                                    <button onClick={async () => {
                                        const plVal = editForm.pl === '' ? null : Number(editForm.pl);
                                        const pctVal = editForm.percent === '' ? null : Number(editForm.percent);
                                        const newData = data.map(d => d.date === editingItem.date ? { ...d, pl: plVal, percent: pctVal } : d);
                                        setData(newData); setEditingItem(null);
                                        isUpdatingRef.current = true;
                                        await fetch(SCRIPT_URL, {
                                            method: 'POST',
                                            mode: 'no-cors',
                                            headers: { 'Content-Type': 'text/plain' },
                                            body: JSON.stringify({ action: 'updateDay', date: editingItem.date, pl: plVal, percent: pctVal })
                                        });
                                        isUpdatingRef.current = false;
                                    }} className="flex-1 py-4 rounded-2xl bg-[#ffd700] text-black font-black uppercase tracking-widest text-xs shadow-[0_0_20px_rgba(212,175,55,0.4)] active:scale-95 transition-all">Commit</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Panel (System Config) */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-3 sm:p-4 z-[100] backdrop-blur-2xl text-white">
                            <div className="bg-[#0d121f] p-5 sm:p-8 rounded-[32px] sm:rounded-[40px] border border-[#ffd700]/40 w-full max-w-[460px] max-h-[92vh] overflow-y-auto config-scroll shadow-3xl relative">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-[#ffd700]/60 to-transparent"></div>
                                <div className="flex flex-col items-center mb-6 sm:mb-8 text-center mt-2">
                                    <div className="w-14 h-14 rounded-full bg-[#ffd700]/10 flex items-center justify-center text-[#ffd700] border border-[#ffd700]/20 mb-3 text-2xl shadow-inner">⚙️</div>
                                    <h3 className="text-xl sm:text-2xl font-black uppercase tracking-tighter mono">System Config</h3>
                                    <p className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest mt-1">Terminal Master Control</p>
                                </div>

                                <div className="space-y-6 sm:space-y-8">
                                    <div className="space-y-3 sm:space-y-4">
                                        <label className="text-[10px] sm:text-xs uppercase text-[#ffd700] font-black tracking-[0.15em] flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 bg-[#ffd700] rounded-full shadow-[0_0_8px_#ffd700]"></span>
                                            Core Equity Balance
                                        </label>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            <div className="bg-black/50 p-3.5 sm:p-4 rounded-2xl border border-white/10">
                                                <span className="text-[9px] text-zinc-400 font-black uppercase block mb-1.5 tracking-widest">Base Capital</span>
                                                <input type="number" value={settingsForm.equity} onChange={e => setSettingsForm({...settingsForm, equity: e.target.value})} className="w-full bg-transparent text-white outline-none font-black text-base sm:text-lg mono" />
                                            </div>
                                            <div className="bg-black/50 p-3.5 sm:p-4 rounded-2xl border border-white/10">
                                                <span className="text-[9px] text-[#ff3b69] font-black uppercase block mb-1.5 tracking-widest">Withdrawn</span>
                                                <input type="number" value={settingsForm.withdrawal} onChange={e => setSettingsForm({...settingsForm, withdrawal: e.target.value})} className="w-full bg-transparent text-white outline-none font-black text-base sm:text-lg mono" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-black/30 p-4 sm:p-5 rounded-[24px] sm:rounded-[30px] border border-[#ffd700]/20 shadow-inner">
                                        <label className="text-[10px] sm:text-xs text-zinc-300 font-black uppercase mb-4 block tracking-widest">Annual P/L Ledger</label>
                                        <div className="grid grid-cols-3 gap-2.5 sm:gap-3">
                                            {['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'].map(m => (
                                                <div key={m} className="bg-black/60 p-2 sm:p-2.5 rounded-xl border border-white/10 focus-within:border-[#ffd700]/50 transition-all">
                                                    <span className="text-[8px] sm:text-[9px] text-zinc-500 font-black block uppercase mb-1 mono tracking-wider">{m}</span>
                                                    <input type="number" value={settingsForm[m + 'PL']} onChange={e => setSettingsForm({...settingsForm, [m + 'PL']: e.target.value})} className="w-full bg-transparent text-white outline-none text-xs font-black mono" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <label className="text-[10px] sm:text-xs uppercase text-zinc-300 font-black tracking-[0.15em] flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 bg-zinc-400 rounded-full"></span>
                                            Broker Identity
                                        </label>
                                        <input type="text" placeholder="Broker Name" value={settingsForm.broker} onChange={e => setSettingsForm({...settingsForm, broker: e.target.value})} className="w-full bg-black/50 text-white p-4 rounded-2xl border border-white/10 outline-none font-black mono text-sm" />
                                        
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            <select value={settingsForm.currency} onChange={e => setSettingsForm({...settingsForm, currency: e.target.value})} className="w-full bg-black/50 text-white p-4 rounded-2xl border border-white/10 outline-none font-black mono text-sm appearance-none uppercase"><option value="USD">USD ($)</option><option value="USC">USC (¢)</option></select>
                                            <input type="number" value={settingsForm.year} onChange={e => setSettingsForm({...settingsForm, year: e.target.value})} className="w-full bg-black/50 text-white p-4 rounded-2xl border border-white/10 outline-none font-black mono text-sm" />
                                        </div>
                                        <select value={settingsForm.month} onChange={e => setSettingsForm({...settingsForm, month: e.target.value})} className="w-full bg-black/50 text-white p-4 rounded-2xl border border-white/10 outline-none font-black mono text-sm appearance-none uppercase">{["January","February","March","April","May","June","July","August","September","October","November","December"].map(m => <option key={m} value={m}>{m}</option>)}</select>
                                        
                                        <div className="bg-[#ffd700]/10 p-5 rounded-[24px] border border-[#ffd700]/30 space-y-3 mt-4">
                                            <label className="text-[10px] text-[#ffd700] font-black uppercase block tracking-widest mb-3">MT4 Credentials</label>
                                            <input type="text" placeholder="Login ID" value={settingsForm.invId} onChange={e => setSettingsForm({...settingsForm, invId: e.target.value})} className="w-full bg-black/60 text-white p-3.5 rounded-xl border border-white/10 outline-none text-xs font-black mono focus:border-[#ffd700] transition-colors" />
                                            <input type="text" placeholder="Server" value={settingsForm.invServer} onChange={e => setSettingsForm({...settingsForm, invServer: e.target.value})} className="w-full bg-black/60 text-white p-3.5 rounded-xl border border-white/10 outline-none text-xs font-black mono focus:border-[#ffd700] transition-colors" />
                                            <input type="text" placeholder="Password" value={settingsForm.invPass} onChange={e => setSettingsForm({...settingsForm, invPass: e.target.value})} className="w-full bg-black/60 text-white p-3.5 rounded-xl border border-white/10 outline-none text-xs font-black mono focus:border-[#ffd700] transition-colors" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-4 mt-8 pb-2">
                                    <button onClick={() => setShowSettingsModal(false)} className="flex-1 text-zinc-400 font-black py-4 uppercase text-[10px] hover:text-white transition-colors tracking-widest">Discard</button>
                                    <button onClick={handleSaveSettings} className="flex-2 px-6 py-4 rounded-[20px] btn-deploy text-[11px] shadow-[0_0_30px_rgba(212,175,55,0.4)]">Deploy Config</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
